name: Package On Tag

on:
  push:
    tags:
      - "*"

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare metadata
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          TAG="${GITHUB_REF_NAME}"
          PKG_NAME="${REPO_NAME}-${TAG}"
          echo "REPO_NAME=${REPO_NAME}" >> "${GITHUB_ENV}"
          echo "TAG=${TAG}" >> "${GITHUB_ENV}"
          echo "PKG_NAME=${PKG_NAME}" >> "${GITHUB_ENV}"

      - name: Build package
        run: |
          # Stage the payload OUTSIDE the repo so the archive doesn't
          # self-include the `dist/` directory we create below.
          STAGE="${RUNNER_TEMP}/${PKG_NAME}"
          mkdir -p "${STAGE}"
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='LICENSE' --exclude='LICENSE.*' \
            --exclude='README*' \
            --exclude='.gitignore*' \
            --exclude='seo-report-*.html' \
            --exclude='plan.md' \
            --exclude='improvements.md' \
            --exclude='tmp/' \
            --exclude='.env' --exclude='.env.local' --exclude='.env.*.local' \
            ./ "${STAGE}/"

          mkdir -p dist
          # Archive contents are flat (no top-level dir wrapper); installers
          # auto-detect either layout.
          (cd "${STAGE}" && zip -r "${GITHUB_WORKSPACE}/dist/${PKG_NAME}.zip" .)
          (cd "${STAGE}" && tar -czf "${GITHUB_WORKSPACE}/dist/${PKG_NAME}.tar.gz" .)
          ls -la dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}
          path: |
            dist/${{ env.PKG_NAME }}.zip
            dist/${{ env.PKG_NAME }}.tar.gz

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.REPO_NAME }} ${{ env.TAG }}
          generate_release_notes: true
          files: |
            dist/${{ env.PKG_NAME }}.zip
            dist/${{ env.PKG_NAME }}.tar.gz
